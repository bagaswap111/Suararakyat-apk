plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.suararakyat.app"
    compileSdk 34
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        public {
            res.srcDirs = ["src/public/res", "src/main/res"]
        }
        government {
            res.srcDirs = ["src/government/res", "src/main/res"]
        }
    }

    defaultConfig {
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
        multiDexEnabled true
    }

    flavorDimensions "app"

    productFlavors {
        public {
            dimension "app"
            applicationId "com.suararakyat.public"
            resValue "string", "app_name", "SuaraRakyat"
        }
        government {
            dimension "app"
            applicationId "com.suararakyat.government"
            resValue "string", "app_name", "Portal Pejabat"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
    implementation "androidx.multidex:multidex:2.0.1"
}
