name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Both APKs
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build SuaraRakyat (Public APK)
        run: |
          flutter build apk \
            --release \
            --flavor rakyat \
            --target lib/main_public.dart \
            --no-tree-shake-icons
          cp build/app/outputs/flutter-apk/app-rakyat-release.apk \
             build/app/outputs/flutter-apk/SuaraRakyat-Public.apk

      - name: Build Portal Pejabat (Government APK)
        run: |
          flutter build apk \
            --release \
            --flavor pejabat \
            --target lib/main_government.dart \
            --no-tree-shake-icons
          cp build/app/outputs/flutter-apk/app-pejabat-release.apk \
             build/app/outputs/flutter-apk/PortalPejabat-Government.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: APKs-Build-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/SuaraRakyat-Public.apk
            build/app/outputs/flutter-apk/PortalPejabat-Government.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            ## SuaraRakyat - Build #${{ github.run_number }}

            ### 📦 Download APK
            | APK | Untuk |
            |-----|-------|
            | `SuaraRakyat-Public.apk` | Masyarakat umum (login anonim) |
            | `PortalPejabat-Government.apk` | Pejabat / pengelola sistem |

            ### 📲 Cara Install
            1. Download APK yang sesuai
            2. Buka Settings Android → Keamanan → aktifkan **Install dari sumber tidak dikenal**
            3. Buka file APK dan install

            > Commit: `${{ github.sha }}`
          files: |
            build/app/outputs/flutter-apk/SuaraRakyat-Public.apk
            build/app/outputs/flutter-apk/PortalPejabat-Government.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
